name: Publish site and PR previews

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages-content
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out requested site version
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && 'main' || github.sha }}
          path: source

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate site
        if: github.event.action != 'closed'
        working-directory: source
        run: node scripts/validate-site.mjs

      - name: Check out published site state
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: publish

      - name: Update production or preview content
        run: >-
          node source/scripts/update-pages-content.mjs
          --source source
          --publish publish
          --event "${{ github.event_name }}"
          --action "${{ github.event.action }}"
          --pr "${{ github.event.pull_request.number }}"

      - name: Save combined Pages state
        working-directory: publish
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Publish ${{ github.event_name }} ${{ github.event.pull_request.number || github.ref_name }}"
            git push origin HEAD:gh-pages
          fi

      - name: Remove Git metadata from deployment artifact
        run: rm -rf publish/.git

      - name: Upload combined Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: publish

      - name: Deploy production and previews
        id: deployment
        uses: actions/deploy-pages@v4
