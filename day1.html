<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Day 1 Database · 5DAI Quest</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Mono&family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap" rel="stylesheet"><style>:root{--bg:#0b1020;--panel:#131e31;--line:#2f4668;--ink:#eef4ff;--muted:#9eb0cc;--amber:#ffc154;--green:#89e5bf}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",sans-serif}.wrap{max-width:1130px;margin:auto;padding:0 24px}.top{padding:25px 0;display:flex;justify-content:space-between;align-items:center}.top a{color:var(--muted);text-decoration:none;font:13px "DM Mono",monospace}.hero{padding:40px 0 28px;border-bottom:1px solid var(--line)}.eyebrow{font:12px "DM Mono",monospace;color:var(--amber);letter-spacing:1.5px;margin:0}.hero h1{font-size:clamp(35px,6vw,60px);margin:12px 0}.hero p:not(.eyebrow){color:var(--muted);font-size:17px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:24px 0}.stat{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:18px}.stat span{display:block;color:var(--muted);font-size:13px}.stat strong{font:30px "DM Mono",monospace;color:var(--amber);display:block;margin-top:7px}.layout{display:grid;grid-template-columns:1fr 290px;gap:22px;padding-bottom:60px}.task-panel,.side{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px}.group{margin-bottom:26px}.group h2{font-size:17px;margin:0 0 11px}.task{display:grid;grid-template-columns:27px 1fr auto;gap:12px;align-items:center;background:#18253a;border-radius:11px;padding:13px;margin:7px 0}.task input{appearance:none;width:21px;height:21px;border:1px solid #617896;border-radius:6px;cursor:pointer}.task input:checked{background:var(--green);border-color:var(--green)}.task input:checked:after{content:'✓';display:block;color:#10271e;font-weight:900;text-align:center;line-height:19px}.task b{font-size:14px}.task small{display:block;color:var(--muted);margin-top:3px}.xp{font:13px "DM Mono",monospace;color:var(--amber)}.side h2{font-size:20px;margin:5px 0 15px}.links a{display:block;color:var(--ink);text-decoration:none;background:#243957;border-radius:10px;padding:13px;margin:8px 0}.links a:hover{outline:1px solid var(--amber)}textarea{width:100%;height:180px;resize:vertical;border:1px solid var(--line);border-radius:10px;background:#0e1726;color:var(--ink);padding:12px;font:14px "Noto Sans TC",sans-serif}.reset{margin-top:12px;background:none;border:0;color:var(--muted);cursor:pointer;text-decoration:underline}@media(max-width:760px){.wrap{padding:0 16px}.layout{grid-template-columns:1fr}.stats{grid-template-columns:1fr}.task{grid-template-columns:25px 1fr}.task .xp{grid-column:2}.top{gap:12px}}</style></head><body><div class="wrap"><header class="top"><a href="index.html">← 5DAI QUEST</a><a href="whitepaper.html">WHITEPAPER DECK ↗</a></header><section class="hero"><p class="eyebrow">DAY 1 DATABASE</p><h1>Vibe Coding 與 Agents</h1><p>這裡才是你的可勾選學習資料庫。完成進度、XP 和學習筆記只存於目前瀏覽器。</p></section><section class="stats"><article class="stat"><span>DAY 1 PROGRESS</span><strong id="progress">0%</strong></article><article class="stat"><span>COMPLETED TASKS</span><strong id="count">0 / 0</strong></article><article class="stat"><span>XP EARNED</span><strong id="xp">0 XP</strong></article></section><main class="layout"><section class="task-panel"><p class="eyebrow">LEARNING CHECKLIST</p><div id="tasks"></div></section><aside class="side"><p class="eyebrow">MATERIALS</p><h2>回到教材</h2><div class="links"><a href="podcast.html">閱讀完整 Podcast →</a><a href="assignment.html">查看完整 Assignment →</a><a href="whitepaper.html">開啟白皮書簡報 →</a></div><p class="eyebrow" style="margin-top:28px">REFLECTION LOG</p><h2>今天學到什麼？</h2><textarea id="notes" placeholder="記下重要觀察、疑問或下一步…"></textarea><button class="reset" id="reset">清除 Day 1 進度</button></aside></main></div><script>const groups=[['Podcast：完整收聽與理解',[['語法的消亡：從打字到描述意圖',8],['兩種流派：Vibe Coding 與 Agentic Engineering',8],['上下文工程與 Context rot',8],['生命週期巨變與模型只佔 10%',8],['指揮家、80% 問題與代幣經濟學',8]]],['Whitepaper：閱讀式簡報',[['閱讀 01–05：Agents 與 Vibe Coding 光譜',12],['閱讀 06–08：Context Engineering 與 Agent Skills',12],['閱讀 09–12：新 SDLC、品質與維護',12],['閱讀 13–17：Factory、Harness、Conductor 與經濟學',12],['閱讀 18：整理自己的三個開始行動',12]]],['Assignment：Unit 1',[['完成 Unit 1 Podcast 收聽',15],['完成 Day 1 白皮書閱讀',15],['完成 Kaggle Codelabs：Antigravity',20],['用 Google AI Studio / Cloud Run 完成一個實作',25]]]];const root=document.querySelector('#tasks'),key='5dai-day1-v2',state=JSON.parse(localStorage.getItem(key)||'{}');let all=[];groups.forEach(([name,items])=>{const g=document.createElement('section');g.className='group';g.innerHTML=`<h2>${name}</h2>`;items.forEach(([title,xp])=>{let id=title;all.push([id,xp]);const row=document.createElement('label');row.className='task';row.innerHTML=`<input type="checkbox" ${state[id]?'checked':''}><span><b>${title}</b><small>完成後獲得 XP</small></span><span class="xp">+${xp}</span>`;row.querySelector('input').onchange=e=>{state[id]=e.target.checked;save()};g.append(row)});root.append(g)});const notes=document.querySelector('#notes');notes.value=localStorage.getItem('5dai-day1-notes')||'';notes.oninput=()=>localStorage.setItem('5dai-day1-notes',notes.value);function save(){localStorage.setItem(key,JSON.stringify(state));const done=all.filter(([id])=>state[id]);document.querySelector('#count').textContent=`${done.length} / ${all.length}`;document.querySelector('#xp').textContent=`${done.reduce((n,[,x])=>n+x,0)} XP`;document.querySelector('#progress').textContent=`${Math.round(done.length/all.length*100)}%`}document.querySelector('#reset').onclick=()=>{if(confirm('確定清除 Day 1 的勾選進度與筆記？')){localStorage.removeItem(key);localStorage.removeItem('5dai-day1-notes');location.reload()}};save()</script></body></html>
