const A='assets/whitepaper/day2/';const slides=[
['DAY 2 · WHITEPAPER','Agent Tools &<br>Interoperability','軟體的下一次演進，不只是「寫」出來，而是由可互通的 Agent 協作與編排。本篇聚焦 MCP、A2A、A2UI、UCP 與 AP2。','協定把一次性的客製整合，轉成可組合、可治理、可擴展的 Agent 生態。','p.1, 6-8'],
['PROTOCOL ECOSYSTEM','五層互通能力','MCP 接工具，A2A 接其他 Agent，A2UI 接人機介面，UCP 接探索與商務流程，AP2 接交易授權。它們共同形成 Harness 的標準連接層。','每個協定解決不同邊界；不要把所有責任塞進同一個接口。','p.7-8','protocol-ecosystem.jpg'],
['WHY NOW','從客製機器，走向可插拔平台','沒有開放標準時，每個 API 都是「一人規格」：要維護客製 wrapper、解析器、權杖刷新與錯誤處理。標準協定讓開發者把時間移回高層意圖、治理與編排。','速度不是少做工程，而是把重複工程交給共同標準。','p.7-9'],
['MCP · ONBOARDING','Discovery → Configuration → Connection','先從公開、官方代管或企業內部 registry 找 server；再設定前置需求、scope、認證與授權；最後執行 handshake，列出工具並檢查輸入輸出 schema。','能連上不代表可安全使用；範圍與授權必須先於工具呼叫。','p.10-12','mcp-onboarding.jpg'],
['MCP · COMPLEXITY','把 O(N × M) 降為 O(N + M)','多個模型各自連接多個工具，傳統作法需要維護每個交叉點。MCP 讓模型端與工具端都接到共同協定，新增任一端不必重寫所有配對。','MCP 的核心經濟效益，是把整合複雜度從乘法改成加法。','p.13-14'],
['MCP · DEBUG & SAFETY','先看傳輸，再改 Prompt','工具叫錯或解析失敗時，先用 MCP Inspector 檢查 schema、payload 與 JSON-RPC。公開 server 要先稽核；憑證用環境變數；正式資料採最小權限、唯讀、HITL 與完整 log。','Public registry 是探索入口，不是信任保證。','p.15-17'],
['A2A · EVOLUTION','單一萬能 Agent 會撞上天花板','工具愈多，搜尋空間與 context 負擔愈大，也形成單點失敗。即使內部分工，若所有 specialist 仍緊密綁定同一協調者，就仍是高度耦合的 monolith。','多 Agent 不等於分散式；跨邊界的契約才是關鍵。','p.17-19','monolith-architecture.jpg'],
['A2A · DISTRIBUTED','跨框架、跨組織委派工作','A2A 讓 orchestrator 透過標準網路介面找到遠端專業 Agent，不需知道對方的模型、框架或內部工具，只需依共同契約交付任務與接收結果。','封裝專業能力，同時保留各 Agent 的技術自治。','p.20-22','distributed-architecture.jpg'],
['A2A · BOUNDARIES','有界工具，無界 Agent','工具適合明確函式契約；協作 Agent 面對模糊目標，可能追問、協商、改變方法或回傳部分結果。Agent Card 描述能力、安全要求與互動 schema，供 registry 探索。','呼叫工具像跳到固定程序；委派 Agent 是交付責任與成功條件。','p.23-26'],
['A2A · CONNECTION','Client、Server 與 Executor','A2A client 發送工作，server 接收標準訊息，再由 executor 轉交底層 Agent。遠端 Agent 不需共享內部程式或框架。','協定處理跨界溝通，executor 保留內部實作自由。','p.26-28','a2a-connection.jpg'],
['A2A · BUSINESS','Agent-as-a-Service 生命週期','專業 Agent 可經歷建置、商業化、部署治理，再由企業應用、orchestrator 或其他 Agent 消費。Registry 同時支援發現與治理。','真正可販售的不是 prompt，而是具 SLA、治理與可發現性的能力。','p.29-31','agent-lifecycle.jpg'],
['A2UI · SECURITY','宣告 UI 意圖，不執行任意程式碼','A2UI 讓 Agent 描述元件、資料與互動；renderer 只映射已核准的 catalog，因此保留動態介面，同時維持安全與既有設計系統。','安全邊界在 renderer 與 catalog，不在模型自律。','p.32-34','a2ui-catalog.jpg'],
['A2UI · TWO PATTERNS','模型決定版面，或工具套模板','意圖多變時由 LLM 產生 A2UI；版面可由輸入確定時，讓工具回固定結構，降低 token 成本並提高可預測性。簡單答案仍應回文字或 JSON。','先決定消費者與互動需求，再決定輸出格式。','p.35-38','query-output-map.jpg'],
['A2UI · CANVAS','從一次性訊息，變成共同工作區','Canvas 保存持續狀態；Agent 可更新圖表與篩選器，使用者也能直接操作。UI 互動反過來成為 Agent 的結構化輸入。','介面不只是輸出，也是人與 Agent 的共同語言。','p.38-39','canvas-flow.jpg'],
['A2UI · PRODUCTION','隨機生成，由確定驗證收口','用 SDK 建立 catalog schema，解析 A2UI block 並逐則驗證；錯誤時重試，仍失敗就降級成文字。也可同時提供 data 與 ui，讓 API 與人類各取所需。','Renderer 永遠不應收到 malformed payload。','p.40-43'],
['COMMERCE','UCP 管「買什麼」，AP2 管「怎麼付」','UCP 統一 catalog、cart、checkout 與 order；AP2 透過可驗證 mandate 與支付握手，限制金額、商家與使用條件。','商務意圖與付款授權要分層，避免便利性吞掉控制權。','p.43-46','commerce-ecosystem.jpg'],
['UCP × AP2','通用商務語言 × 安全付款鎖箱','UCP 重視跨商家整合、共享語言與可擴展架構；AP2 重視授權與稽核、意圖真實性、Agent 錯誤防護與責任歸屬。','UCP 建立交易路徑；AP2 證明交易確實在人的授權內。','p.45-46','ucp-ap2-comparison.jpg'],
['FINAL TAKEAWAY','協定讓 Agent 成為可治理的虛擬團隊','MCP 消除工具接線債，A2A 形成跨邊界分工，A2UI 安全呈現互動介面，UCP 與 AP2 把能力延伸到可稽核交易。','下一步：畫出工具、Agent、UI 與交易邊界，再為每條邊界選對協定。','p.47']];
const deck=document.querySelector('#deck');slides.forEach((s,n)=>{const e=document.createElement('article');e.className=`slide ${s[5]?'visual':''} ${n?'':'active'}`;e.innerHTML=`<section><span class="k">${String(n+1).padStart(2,'0')} / ${slides.length} · ${s[0]}</span><h1>${s[1]}</h1><p>${s[2]}</p><p class="take">${s[3]}</p></section>${s[5]?`<section><img class="diagram" src="${A+s[5]}" alt="Day_2.pdf ${s[4]}：${s[1]}" tabindex="0"><p class="caption">來源：Day_2.pdf ${s[4]}（點擊放大）</p></section>`:`<p class="caption">來源：Day_2.pdf ${s[4]}</p>`}`;deck.append(e)});
const pages=[...document.querySelectorAll('.slide')],input=document.querySelector('#page'),total=document.querySelector('#total'),modal=document.querySelector('#modal'),zoom=document.querySelector('#zoom');let i=Math.max(0,Math.min(pages.length-1,Number(location.hash.match(/page=(\d+)/)?.[1]||localStorage.getItem('5dai-day2-whitepaper-slide')||1)-1)),lock=false,tx=0,ty=0;function go(n){i=Math.max(0,Math.min(pages.length-1,n));pages.forEach((p,j)=>p.classList.toggle('active',j===i));input.value=i+1;total.textContent=`/ ${pages.length}`;first.disabled=prev.disabled=i===0;next.disabled=last.disabled=i===pages.length-1;localStorage.setItem('5dai-day2-whitepaper-slide',i+1);history.replaceState(null,'',`#page=${i+1}`);scrollTo(0,0)}first.onclick=()=>go(0);prev.onclick=()=>go(i-1);next.onclick=()=>go(i+1);last.onclick=()=>go(pages.length-1);input.onchange=()=>go(+input.value-1);document.onkeydown=e=>{if(e.key==='Escape'&&modal.classList.contains('open'))return shut();if(modal.classList.contains('open')||e.target.matches('input,button,a'))return;if(['ArrowLeft','PageUp'].includes(e.key))go(i-1);if(['ArrowRight','PageDown'].includes(e.key))go(i+1)};document.addEventListener('wheel',e=>{if(lock||Math.abs(e.deltaY)<30||modal.classList.contains('open'))return;lock=true;go(i+(e.deltaY>0?1:-1));setTimeout(()=>lock=false,450)},{passive:true});document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].clientX;ty=e.changedTouches[0].clientY},{passive:true});document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.25)go(i+(dx<0?1:-1))},{passive:true});function shut(){modal.classList.remove('open');modal.setAttribute('aria-hidden','true');zoom.removeAttribute('src')}document.querySelectorAll('.diagram').forEach(img=>{const open=()=>{zoom.src=img.src;zoom.alt=img.alt;modal.classList.add('open');modal.setAttribute('aria-hidden','false');close.focus()};img.onclick=open;img.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();open()}}});close.onclick=shut;modal.onclick=e=>{if(e.target===modal)shut()};go(i);
</script><script src="course-data.js"></script><script src="progress.js"></script><script type="module" src="firebase-sync.js"></script></body></html>
