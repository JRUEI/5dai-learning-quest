<script src="course-data.js"></script><script src="progress.js"></script><script>
const slides=[
{k:'DAY 1 · WHITEPAPER READING',title:'The New SDLC<br>with Vibe Coding',body:'這份 Day 1 白皮書討論的不是單一模型或單一工具，而是軟體開發如何從「人逐行實作」變成「人設計工作系統、Agent 在系統中執行、測試持續驗證」。',take:'閱讀主線：模型提供能力；Context、Harness、Evals 與人類判斷，決定能力能否可靠地交付價值。'},
{k:'02 / 30 · READING MAP',title:'先建立全景，再看細節',body:'白皮書可以分為六個層次：<br>1. Agent 與 Vibe Coding 的基本概念<br>2. Context Engineering<br>3. 新 SDLC 的各階段變化<br>4. Factory model 與 Harness engineering<br>5. Conductor / Orchestrator 的新角色<br>6. 經濟模型、團隊與個人如何開始',take:'接下來每一頁都會對應原始白皮書的概念或圖解；原始 PDF 不會被放上網站。'},
{k:'03 / 30 · AGENT LOOP',title:'Agent 是一個持續工作的迴圈',body:'Agent 收到任務後，不是只回覆一段文字；它會感知目前狀態、決定下一步、呼叫工具、讀取結果，再決定是否繼續。這個「觀察 → 推理 → 行動 → 回饋」的迴圈，是後面所有開發流程的核心。',img:'agent-loop.jpg',cap:'圖解：Day_1.pdf p.10，Agent 的基本任務迴圈。',take:'和聊天機器人的差異：Agent 會改變或查詢環境，並把結果帶回下一輪判斷。'},
{k:'04 / 30 · AGENT COMPONENTS',title:'一個 Agent 的五個部分',body:'<ul><li><b>Model：</b>讀取 Context、推理並選下一步。</li><li><b>Tools：</b>API、程式碼、資料庫與可委派的其他 Agent。</li><li><b>Memory：</b>保留互動紀錄與專案狀態。</li><li><b>Orchestration：</b>組裝 Context、調度工具與控制迴圈。</li><li><b>Deployment：</b>把原型變成有身分、監控與基礎設施的服務。</li></ul>',take:'模型不是 Agent 的全部；它只是推理引擎。'},
{k:'05 / 30 · VIBE CODING',title:'Vibe Coding：先說意圖，再逐步修正',body:'Vibe Coding 的典型做法，是用自然語言描述想要的功能或體驗，讓 AI 快速產生可執行的原型，再透過觀察、回饋與修正前進。它特別適合探索、個人工具與速度優先的場景。',take:'它不是不需要工程，而是把「先打出所有語法」換成「先把意圖講清楚」。'},
{k:'06 / 30 · THE SPECTRUM',title:'從 Vibe Coding 到 Agentic Engineering',body:'白皮書強調這不是二分法，而是一條光譜。隨著任務的重要性、風險與複雜度增加，規格、護欄、測試與可審查性也必須同步增加。',img:'vibe-spectrum.jpg',cap:'圖解：Day_1.pdf p.14，可靠性隨結構化程度與可驗證性提升。',take:'關鍵分界不是「有沒有用 AI」，而是「輸出是否能被驗證」。'},
{k:'07 / 30 · VERIFICATION',title:'Tests 與 Evals 是與 AI 的契約',body:'<div class="split"><div class="box"><h3>Tests</h3><p>由程式檢查可決定的行為，例如 API 回傳、資料驗證、邊界條件與回歸錯誤。</p></div><div class="box"><h3>Evals</h3><p>用標註資料、評分規準或 LLM judge 評估不完全確定的結果，例如研究品質、回覆正確性與任務軌跡。</p></div></div>',take:'沒有 Tests 與 Evals，再精緻的 prompt 仍屬於 Vibe Coding。'},
{k:'08 / 30 · CONTEXT ENGINEERING',title:'真正的關鍵技能：Context Engineering',body:'AI 產生的程式品質，越來越少取決於「提示詞寫得多漂亮」，越來越取決於它取得的資訊是否完整、結構化且恰好相關。Context 包括專案規則、架構、歷史決策、工具結果與任務限制。',take:'Prompt 是一次溝通；Context Engineering 是設計長期可靠的資訊供給。'},
{k:'09 / 30 · SIX TYPES',title:'六種 Context，缺一種都可能失真',body:'<ul><li><b>Instructions：</b>角色、目標、操作邊界。</li><li><b>Knowledge：</b>文件、架構圖、領域資料。</li><li><b>Memory：</b>短期紀錄與長期專案狀態。</li><li><b>Examples：</b>少量示範與既有模式。</li><li><b>Tools：</b>API、腳本、服務的精確定義。</li><li><b>Guardrails：</b>硬性限制、格式規則與安全驗證。</li></ul>',take:'你剛建立的 AGENTS.md，正是 Instructions + Guardrails 的起點。'},
{k:'10 / 30 · STATIC VS DYNAMIC',title:'Static 與 Dynamic Context 必須分工',body:'固定規則不該隨每次任務改寫；即時資料不該永久塞進提示詞。系統應保存穩定的架構與規範，同時在任務當下動態抓取檔案、工具結果、問題狀態與相關 Skill。',img:'context-architecture.jpg',cap:'圖解：Day_1.pdf p.17，從六類 Context 組裝出靜態與動態資訊層。',take:'資訊越多不一定越好；無關或過期資訊會造成 Context rot。'},
{k:'11 / 30 · AGENT SKILLS',title:'Skills：把最佳做法變成可按需取用的能力',body:'Skill 是任務說明、工具使用方式、範例與參考資料的可重用封裝。Agent 先讀摘要，只有在需要時才展開完整內容，這種 progressive disclosure 能降低雜訊與 token 成本。',take:'把「每次都重新解釋」改成「在正確時機載入正確 Skill」。'},
{k:'12 / 30 · CONTEXT ROT',title:'Context rot：為什麼越聊越容易歪掉？',body:'Context 過長、互相矛盾、已過期，或把大量不相關資料一起給模型時，模型會失去任務焦點。解法不是無限制增加 token，而是版本化規則、精準檢索、摘要舊歷程，並讓 Agent 只讀任務所需的資訊。',take:'好的系統會主動管理 Context 的新鮮度與相關性。'},
{k:'13 / 30 · NEW SDLC',title:'新 SDLC：不是加速舊流程，而是重新分配工作',body:'傳統 SDLC 已從瀑布走到敏捷、CI 與 DevOps；Agent 進一步壓縮實作時間，使瓶頸轉移到需求、架構、驗證與責任判斷。交接邊界開始模糊，迭代從數週縮短到數分鐘。',img:'new-sdlc.jpg',cap:'圖解：Day_1.pdf p.20，傳統 iterative SDLC 與 AI-driven SDLC 的比較。',take:'人的角色從主要實作者，轉為系統設計者與品質仲裁者。'},
{k:'14 / 30 · REQUIREMENTS',title:'需求：把模糊意圖轉成可執行規格',body:'Agent 能協助整理訪談、生成 user story、列出假設與比較方案；但「該解哪個問題」、「誰承擔風險」、「什麼算成功」仍需要人做決策。好的規格應寫出目標、非目標、限制與驗收方式。',take:'越早把成功定義寫清楚，越少在後段用返工補救。'},
{k:'15 / 30 · DESIGN',title:'設計與架構：先定護欄，再讓 Agent 加速',body:'Agent 可提出架構選項、讀取既有 codebase、補齊介面與文件；人類要判斷長期演化、資料邊界、安全、成本與團隊理解程度。架構規則應成為可讀取、可版本控制的 Context。',take:'能生成架構圖，不等於能替組織承擔架構決策。'},
{k:'16 / 30 · IMPLEMENTATION',title:'實作：Agent 適合做可拆解、可驗收的工作',body:'在明確的 repository、工具與測試環境內，Agent 可處理樣板程式、重構、跨檔案修改、文件與初步除錯。任務越能拆成小單位、每一步越有可檢查結果，代理化越可靠。',take:'把大型願望改寫成一連串可驗收任務，是產能提升的前提。'},
{k:'17 / 30 · QUALITY FLYWHEEL',title:'品質飛輪：失敗案例要回到系統裡',body:'Agent 能生成 edge case 與 property-based tests；更重要的是把每次失敗分類、找出原因、補進 eval 或 regression suite，再監控生產環境。每一輪都讓下一輪更少重犯同一種錯。',take:'生成只是開始；可持續的品質來自回饋閉環。'},
{k:'18 / 30 · REVIEW & DEPLOY',title:'Review 與 Deploy：AI 增強，而不取代責任',body:'AI 可先找 bug、風格問題、弱點與效能風險，降低 reviewer 的認知負擔。但架構取捨、可維護性、策略一致性仍需人判斷。部署後還要監控、回滾與把事故轉成新的測試。',take:'高速度的交付，更需要清楚的批准權與可逆的部署。'},
{k:'19 / 30 · MAINTENANCE',title:'維護：把「部署後」也視為開發的一部分',body:'Agent 能協助讀 issue、追蹤依賴、找安全更新與提出修補；但自動修改若缺少 review、權限控制、回滾與可觀測性，也會放大技術債與安全風險。',take:'可靠的系統不是永不失敗，而是失敗時能快速發現、理解與復原。'},
{k:'20 / 30 · FACTORY MODEL',title:'Factory model：開發者設計工廠',body:'工匠模式依賴某個人知道怎麼做；工廠模式把好的做法寫進流程、規格、工具、測試與環境。開發者不再親手組裝每一個零件，而是設計產線與品質控制。',img:'factory-model.jpg',cap:'圖解：Day_1.pdf p.25，Developer Zone 設定 specs / guardrails，Agent Factory Floor 產生並驗證輸出。',take:'開發者的產出不只是一段 code，而是能穩定產生 code 的系統。'},
{k:'21 / 30 · HARNESS ENGINEERING',title:'Harness：讓模型能可靠上工的外骨骼',body:'Harness 包括 instructions、rule files、tools、sandbox、執行環境、orchestration、hooks、tests、evals 與 observability。模型提供推理能力；Harness 決定它能看到什麼、能做什麼、如何被限制與驗收。',take:'不要只問「哪個模型比較強」；要問「它被放進什麼 Harness 裡工作」。'},
{k:'22 / 30 · HARNESS MAP',title:'模型只佔約 10%，其餘是工作系統',body:'圖中由中心向外展開：模型、規則與工具、執行環境、評估與觀測、部署與雲端基礎設施。越往外，越是團隊自己要負責的系統設計。',img:'harness-model.jpg',cap:'圖解：Day_1.pdf p.27，Model + Harness 的分層架構。',take:'真正的競爭優勢，是團隊累積的 Harness，不是單次選到的模型。'},
{k:'23 / 30 · HARNESS IN SDLC',title:'Harness 也要跟著 SDLC 演化',body:'在需求階段，Harness 放入規格與範例；在實作階段，提供 repo、工具與 sandbox；在測試階段，執行 tests / evals；在部署後，收集 logs、成本、延遲與失敗模式。',take:'Harness 不是一份 prompt 檔，而是全生命週期的工程資產。'},
{k:'24 / 30 · CONDUCTOR',title:'Conductor：保留逐步掌控的人類模式',body:'Conductor 模式下，開發者在 IDE 中逐步驅動 Agent：提出一個任務、檢查變更、再決定下一步。它適合複雜邏輯、陌生 codebase 或需要理解每個改動的情境。',take:'優點是控制力；風險是人若指揮每一個按鍵，AI 的吞吐量會受限。'},
{k:'25 / 30 · ORCHESTRATOR',title:'Orchestrator：非同步、多 Agent 的編排',body:'Orchestrator 在更高抽象層定義目標、分派任務給 Agent、定期檢查結果並校正方向。它適用於規格清楚的 bug fix、feature、遷移與測試生成，也要求更強的任務規格與驗收能力。',img:'developer-modes.jpg',cap:'圖解：Day_1.pdf p.32，Conductor 與 Orchestrator 的工作方式比較。',take:'不是永遠選其中一種；依風險、清晰度與可驗證性調整自主程度。'},
{k:'26 / 30 · THE 80% PROBLEM',title:'Agent 可能接手 80%，但剩下 20% 更值錢',body:'例行實作、轉換格式、補文件與初步測試會被大幅自動化；真正困難的是模糊需求、跨系統取捨、例外處理、品質定義與責任歸屬。這些工作需要系統思考與判斷。',take:'把 Agent 省下的時間，投入定義問題與提升驗證，而非製造更多未驗收輸出。'},
{k:'27 / 30 · BUILD - EVALUATE - DEPLOY',title:'生產 Agent 的基本閉環',body:'白皮書示例把流程寫成：建立 Agent → 建立 evalset → 執行 eval → 部署 → 回報。原型不是終點；只有經過評估、觀測與可部署環境，才開始接近 production agent。',take:'先挑一個重複、低風險、可量測的工作流程，做成第一個端到端 Agent。'},
{k:'28 / 30 · ECONOMICS',title:'AI 開發經濟學：低 CapEx，高 OpEx',body:'模型與工具使小團隊能以低啟動成本快速產出原型；但 token、推理、評估、人類 review、監控與安全治理是持續營運成本。Context 管理、Skills 重用與模型路由會直接影響成本與品質。',img:'economics.jpg',cap:'圖解：Day_1.pdf p.40，Vibe Coding、Agentic Engineering 與消費者價值 / 成本曲線。',take:'便宜地生成，不代表便宜地營運；成本與品質必須一起設計。'},
{k:'29 / 30 · FOR INDIVIDUALS',title:'個人開發者：從哪裡開始？',body:'<ul><li>建立 AGENTS.md：stack、慣例、硬規則與 workflow。</li><li>安裝並練習一組能 build / evaluate / deploy 的 Skills。</li><li>選一個重複工作流，做成第一個 Agent。</li><li>先寫 tests 與 evals，將意圖變成契約。</li><li>所有準備 shipping 的輸出，都要逐行 review。</li></ul>',take:'這五點正是你目前建立專案規則、模板與學習系統的原因。'},
{k:'30 / 30 · FINAL TAKEAWAY',title:'Intent 是新的介面',body:'白皮書的結論不是「人會被模型取代」，而是開發者的價值會從實作速度移往規格、評估、架構判斷與編排人機團隊。最強的結果來自人設方向、Agent 做實作、明確 handoff 與回饋機制共同運作。',take:'下一步：用 Day 1 資料庫完成閱讀、選一個小而可驗收的工作流，開始建立自己的 Harness。'}
];

const modal=document.querySelector('#page-modal'),modalImage=document.querySelector('#modal-image'),modalCaption=document.querySelector('#modal-caption'),modalClose=document.querySelector('#modal-close');function openDiagram(img){modalImage.src=img.src;modalImage.alt=img.alt;modalCaption.textContent=img.alt;modal.classList.add('open');modal.setAttribute('aria-hidden','false');modalClose.focus()}function closeDiagram(){modal.classList.remove('open');modal.setAttribute('aria-hidden','true');modalImage.removeAttribute('src')}document.querySelectorAll('.diagram').forEach(img=>{img.addEventListener('click',()=>openDiagram(img));img.addEventListener('keydown',event=>{if(event.key==='Enter'||event.key===' '){event.preventDefault();openDiagram(img)}})});modalClose.addEventListener('click',closeDiagram);modal.addEventListener('click',event=>{if(event.target===modal)closeDiagram()});
const pages=[...document.querySelectorAll('.slide')],prev=document.querySelector('#prev'),next=document.querySelector('#next'),counter=document.querySelector('#counter');let i=Math.min(ProgressStore.state.whitepaperSlide||0,pages.length-1);function render(){pages.forEach((p,n)=>p.classList.toggle('active',n===i));counter.textContent=`${i+1} / ${pages.length}`;prev.disabled=i===0;next.disabled=i===pages.length-1;ProgressStore.setWhitepaperSlide(i);window.scrollTo(0,0)}prev.onclick=()=>{if(i){i--;render()}};next.onclick=()=>{if(i<pages.length-1){i++;render()}};document.addEventListener('keydown',e=>{if(e.key==='Escape'&&modal.classList.contains('open')){closeDiagram();return}if(modal.classList.contains('open'))return;if(e.key==='ArrowLeft')prev.click();if(e.key==='ArrowRight')next.click()});render();
